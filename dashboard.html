<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — RR Joyería</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            gold: { light: '#c9a84c', DEFAULT: '#8B6914', dark: '#5a4409' },
            cream: '#faf8f4',
            charcoal: '#1a1a1a'
          },
          fontFamily: {
            serif: ['Cormorant Garamond', 'serif'],
            sans: ['Montserrat', 'sans-serif']
          }
        }
      }
    }
  </script>
  <style>
    body { background-color: #f5f0e8; }
    .gold-border { border: 1px solid #c9a84c55; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    .fade-in { animation: fadeIn 0.3s ease forwards; }
  </style>
</head>
<body class="font-sans text-charcoal min-h-screen">

  <!-- LOGIN SCREEN -->
  <div id="login-screen" class="min-h-screen flex items-center justify-center px-4">
    <div class="bg-white gold-border p-10 w-full max-w-sm shadow-xl">
      <div class="text-center mb-8">
        <img src="assets/logo.jpg" alt="RR" class="h-16 mx-auto mb-4 object-contain"/>
        <h1 class="font-serif text-3xl italic text-gold-dark">Panel Admin</h1>
        <p class="font-sans text-xs tracking-widest text-gray-400 uppercase mt-1">RR Joyería</p>
      </div>
      <div class="space-y-4">
        <div>
          <label class="font-sans text-xs tracking-widest uppercase text-gray-500 block mb-1">Usuario</label>
          <input id="login-user" type="text" class="w-full border border-gray-200 px-3 py-2 font-sans text-sm focus:outline-none focus:border-gold" placeholder="admin"/>
        </div>
        <div>
          <label class="font-sans text-xs tracking-widest uppercase text-gray-500 block mb-1">Contraseña</label>
          <input id="login-pass" type="password" class="w-full border border-gray-200 px-3 py-2 font-sans text-sm focus:outline-none focus:border-gold" placeholder="••••••" onkeydown="if(event.key==='Enter') doLogin()"/>
        </div>
        <p id="login-error" class="text-red-500 text-xs hidden">Usuario o contraseña incorrectos.</p>
        <button onclick="doLogin()" class="w-full bg-gold text-white font-sans text-xs tracking-widest uppercase py-3 hover:bg-gold-dark transition-colors duration-200">
          Ingresar
        </button>
      </div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" class="hidden min-h-screen">

    <!-- NAVBAR -->
    <nav class="bg-white border-b border-gold/20 px-6 py-4 flex items-center justify-between sticky top-0 z-50">
      <div class="flex items-center gap-3">
        <img src="assets/logo.jpg" alt="RR" class="h-9 w-9 object-contain"/>
        <div>
          <p class="font-serif text-base leading-none text-gold-dark">RR Joyería</p>
          <p class="font-sans text-xs tracking-widest text-gold uppercase">Dashboard</p>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <a href="index.html" target="_blank" class="font-sans text-xs tracking-widest uppercase border border-gold text-gold px-4 py-2 hover:bg-gold hover:text-white transition-all duration-200">
          Ver Tienda
        </a>
        <button onclick="doLogout()" class="font-sans text-xs tracking-widest uppercase border border-red-300 text-red-400 px-4 py-2 hover:bg-red-400 hover:text-white transition-all duration-200">
          Salir
        </button>
      </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-8">

      <!-- STATS -->
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
        <div class="bg-white gold-border p-5 text-center">
          <p id="stat-total" class="font-serif text-4xl text-gold-dark">0</p>
          <p class="font-sans text-xs tracking-widest text-gray-400 uppercase mt-1">Productos</p>
        </div>
        <div class="bg-white gold-border p-5 text-center">
          <p id="stat-cats" class="font-serif text-4xl text-gold-dark">0</p>
          <p class="font-sans text-xs tracking-widest text-gray-400 uppercase mt-1">Categorías</p>
        </div>
        <div class="bg-white gold-border p-5 text-center">
          <p id="stat-max" class="font-serif text-2xl text-gold-dark">₡0</p>
          <p class="font-sans text-xs tracking-widest text-gray-400 uppercase mt-1">Precio Máx</p>
        </div>
        <div class="bg-white gold-border p-5 text-center">
          <p id="stat-min" class="font-serif text-2xl text-gold-dark">₡0</p>
          <p class="font-sans text-xs tracking-widest text-gray-400 uppercase mt-1">Precio Mín</p>
        </div>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

        <!-- FORMULARIO -->
        <div class="lg:col-span-1">
          <div class="bg-white gold-border p-6">
            <h2 id="form-title" class="font-serif text-2xl italic text-gold-dark mb-6">Agregar Producto</h2>

            <div class="space-y-4">
              <input type="hidden" id="edit-id"/>

              <div>
                <label class="font-sans text-xs tracking-widest uppercase text-gray-500 block mb-1">Nombre *</label>
                <input id="f-name" type="text" class="w-full border border-gray-200 px-3 py-2 text-sm focus:outline-none focus:border-gold" placeholder="Collar de oro 18k"/>
              </div>

              <div>
                <label class="font-sans text-xs tracking-widest uppercase text-gray-500 block mb-1">Categoría *</label>
                <div class="flex gap-2">
                  <input id="f-category" type="text" list="cat-list" class="flex-1 border border-gray-200 px-3 py-2 text-sm focus:outline-none focus:border-gold" placeholder="Collares, Anillos..."/>
                  <datalist id="cat-list"></datalist>
                </div>
              </div>

              <div>
                <label class="font-sans text-xs tracking-widest uppercase text-gray-500 block mb-1">Precio (₡) *</label>
                <input id="f-price" type="number" class="w-full border border-gray-200 px-3 py-2 text-sm focus:outline-none focus:border-gold" placeholder="25000"/>
              </div>

              <div>
                <label class="font-sans text-xs tracking-widest uppercase text-gray-500 block mb-1">Descripción</label>
                <textarea id="f-desc" rows="3" class="w-full border border-gray-200 px-3 py-2 text-sm focus:outline-none focus:border-gold resize-none" placeholder="Descripción del producto..."></textarea>
              </div>

              <div>
                <label class="font-sans text-xs tracking-widest uppercase text-gray-500 block mb-2">Foto del Producto</label>
                <div id="drop-zone" class="border-2 border-dashed border-gold/30 p-6 text-center cursor-pointer hover:border-gold transition-colors" onclick="document.getElementById('f-image').click()">
                  <div id="drop-preview" class="hidden">
                    <img id="preview-img" class="h-32 mx-auto object-contain mb-2"/>
                    <p class="font-sans text-xs text-gray-400">Click para cambiar</p>
                  </div>
                  <div id="drop-placeholder">
                    <svg class="w-8 h-8 text-gold/40 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                    <p class="font-sans text-xs text-gray-400">Click para subir foto</p>
                  </div>
                  <input id="f-image" type="file" accept="image/*" class="hidden" onchange="previewImage(this)"/>
                </div>
              </div>

              <div class="flex gap-2 pt-2">
                <button onclick="saveProduct()" class="flex-1 bg-gold text-white font-sans text-xs tracking-widest uppercase py-3 hover:bg-gold-dark transition-colors">
                  Guardar
                </button>
                <button onclick="clearForm()" id="cancel-btn" class="hidden px-4 border border-gray-300 text-gray-500 font-sans text-xs tracking-widest uppercase hover:bg-gray-50 transition-colors">
                  Cancelar
                </button>
              </div>
              <p id="form-msg" class="text-center text-xs hidden"></p>
            </div>
          </div>
        </div>

        <!-- LISTA DE PRODUCTOS -->
        <div class="lg:col-span-2">
          <div class="flex items-center justify-between mb-4">
            <h2 class="font-serif text-2xl italic text-gold-dark">Productos</h2>
            <input id="search-input" type="text" onkeyup="renderList()" class="border border-gray-200 px-3 py-2 text-sm focus:outline-none focus:border-gold w-48" placeholder="Buscar..."/>
          </div>

          <div id="product-list" class="space-y-3"></div>
          <div id="list-empty" class="hidden text-center py-16">
            <p class="font-serif text-3xl italic text-gold/30">Sin productos</p>
            <p class="font-sans text-xs text-gray-400 mt-2">Agrega tu primer producto con el formulario.</p>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script>
    // ── AUTH ──────────────────────────────────────────────
    const ADMIN_USER = 'admin';
    const ADMIN_PASS = 'rr2025';

    function doLogin() {
      const u = document.getElementById('login-user').value.trim();
      const p = document.getElementById('login-pass').value.trim();
      if (u === ADMIN_USER && p === ADMIN_PASS) {
        sessionStorage.setItem('rr_auth', '1');
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('dashboard').classList.remove('hidden');
        initDashboard();
      } else {
        document.getElementById('login-error').classList.remove('hidden');
      }
    }

    function doLogout() {
      sessionStorage.removeItem('rr_auth');
      location.reload();
    }

    if (sessionStorage.getItem('rr_auth') === '1') {
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('dashboard').classList.remove('hidden');
      initDashboard();
    }

    // ── STORAGE ───────────────────────────────────────────
    function getProducts() { return JSON.parse(localStorage.getItem('rr_products') || '[]'); }
    function saveProducts(arr) { localStorage.setItem('rr_products', JSON.stringify(arr)); }

    function formatPrice(p) {
      return new Intl.NumberFormat('es-CR', { style:'currency', currency:'CRC', minimumFractionDigits:0 }).format(p);
    }

    // ── IMAGE PREVIEW ─────────────────────────────────────
    let currentImageBase64 = '';

    function previewImage(input) {
      if (!input.files || !input.files[0]) return;
      const reader = new FileReader();
      reader.onload = e => {
        currentImageBase64 = e.target.result;
        document.getElementById('preview-img').src = currentImageBase64;
        document.getElementById('drop-preview').classList.remove('hidden');
        document.getElementById('drop-placeholder').classList.add('hidden');
      };
      reader.readAsDataURL(input.files[0]);
    }

    // ── FORM ──────────────────────────────────────────────
    function clearForm() {
      document.getElementById('edit-id').value = '';
      document.getElementById('f-name').value = '';
      document.getElementById('f-category').value = '';
      document.getElementById('f-price').value = '';
      document.getElementById('f-desc').value = '';
      document.getElementById('f-image').value = '';
      currentImageBase64 = '';
      document.getElementById('preview-img').src = '';
      document.getElementById('drop-preview').classList.add('hidden');
      document.getElementById('drop-placeholder').classList.remove('hidden');
      document.getElementById('form-title').textContent = 'Agregar Producto';
      document.getElementById('cancel-btn').classList.add('hidden');
      document.getElementById('form-msg').classList.add('hidden');
    }

    function saveProduct() {
      const id    = document.getElementById('edit-id').value;
      const name  = document.getElementById('f-name').value.trim();
      const cat   = document.getElementById('f-category').value.trim();
      const price = parseFloat(document.getElementById('f-price').value);
      const desc  = document.getElementById('f-desc').value.trim();
      const msg   = document.getElementById('form-msg');

      if (!name || !cat || isNaN(price)) {
        msg.textContent = 'Nombre, categoría y precio son obligatorios.';
        msg.className = 'text-center text-xs text-red-500';
        msg.classList.remove('hidden');
        return;
      }

      const products = getProducts();

      if (id) {
        const idx = products.findIndex(p => p.id === id);
        if (idx > -1) {
          products[idx] = { ...products[idx], name, category: cat, price, description: desc, image: currentImageBase64 || products[idx].image };
        }
      } else {
        products.unshift({ id: Date.now().toString(), name, category: cat, price, description: desc, image: currentImageBase64, createdAt: new Date().toISOString() });
      }

      saveProducts(products);
      msg.textContent = id ? '✓ Producto actualizado.' : '✓ Producto guardado.';
      msg.className = 'text-center text-xs text-green-600';
      msg.classList.remove('hidden');
      setTimeout(() => { clearForm(); msg.classList.add('hidden'); }, 1500);
      renderList();
      updateStats();
      updateCatList();
    }

    function editProduct(id) {
      const p = getProducts().find(x => x.id === id);
      if (!p) return;
      document.getElementById('edit-id').value = p.id;
      document.getElementById('f-name').value = p.name;
      document.getElementById('f-category').value = p.category;
      document.getElementById('f-price').value = p.price;
      document.getElementById('f-desc').value = p.description || '';
      currentImageBase64 = p.image || '';
      if (p.image) {
        document.getElementById('preview-img').src = p.image;
        document.getElementById('drop-preview').classList.remove('hidden');
        document.getElementById('drop-placeholder').classList.add('hidden');
      }
      document.getElementById('form-title').textContent = 'Editar Producto';
      document.getElementById('cancel-btn').classList.remove('hidden');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function deleteProduct(id) {
      if (!confirm('¿Eliminar este producto?')) return;
      saveProducts(getProducts().filter(p => p.id !== id));
      renderList();
      updateStats();
      updateCatList();
    }

    // ── LIST ──────────────────────────────────────────────
    function renderList() {
      const search = document.getElementById('search-input').value.toLowerCase();
      const products = getProducts().filter(p =>
        p.name.toLowerCase().includes(search) ||
        (p.category || '').toLowerCase().includes(search)
      );
      const container = document.getElementById('product-list');
      const empty = document.getElementById('list-empty');

      if (products.length === 0) {
        container.innerHTML = '';
        empty.classList.remove('hidden');
        return;
      }
      empty.classList.add('hidden');

      container.innerHTML = products.map(p => `
        <div class="bg-white gold-border flex gap-4 p-4 fade-in">
          <div class="w-16 h-16 flex-shrink-0 bg-gray-50 overflow-hidden">
            <img src="${p.image || 'https://placehold.co/80x80/f5f0e8/8B6914?text=RR'}" class="w-full h-full object-cover"/>
          </div>
          <div class="flex-1 min-w-0">
            <div class="flex items-start justify-between gap-2">
              <div>
                <p class="font-sans text-xs tracking-widest text-gold uppercase">${p.category || ''}</p>
                <p class="font-serif text-base text-charcoal">${p.name}</p>
                <p class="font-sans text-xs text-gray-400 truncate">${p.description || ''}</p>
              </div>
              <p class="font-serif text-lg text-gold-dark whitespace-nowrap">${formatPrice(p.price)}</p>
            </div>
            <div class="flex gap-2 mt-2">
              <button onclick="editProduct('${p.id}')" class="font-sans text-xs tracking-widest uppercase border border-gold text-gold px-3 py-1 hover:bg-gold hover:text-white transition-all">
                Editar
              </button>
              <button onclick="deleteProduct('${p.id}')" class="font-sans text-xs tracking-widest uppercase border border-red-200 text-red-400 px-3 py-1 hover:bg-red-400 hover:text-white transition-all">
                Eliminar
              </button>
            </div>
          </div>
        </div>
      `).join('');
    }

    // ── STATS ─────────────────────────────────────────────
    function updateStats() {
      const products = getProducts();
      const prices = products.map(p => p.price).filter(Boolean);
      const cats = [...new Set(products.map(p => p.category))].filter(Boolean);
      document.getElementById('stat-total').textContent = products.length;
      document.getElementById('stat-cats').textContent = cats.length;
      document.getElementById('stat-max').textContent = prices.length ? formatPrice(Math.max(...prices)) : '₡0';
      document.getElementById('stat-min').textContent = prices.length ? formatPrice(Math.min(...prices)) : '₡0';
    }

    function updateCatList() {
      const cats = [...new Set(getProducts().map(p => p.category))].filter(Boolean);
      document.getElementById('cat-list').innerHTML = cats.map(c => `<option value="${c}"/>`).join('');
    }

    function initDashboard() {
      renderList();
      updateStats();
      updateCatList();
    }
  </script>
</body>
</html>
